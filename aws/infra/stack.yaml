AWSTemplateFormatVersion: "2010-09-09"
Description: >
  POD pipeline — VPC Lambda (container image), EventBridge Scheduler daily trigger.
  Handler runs in a single invocation: Metabase fetch, in-memory batch download/score,
  Postgres flush at end. No SAM. Deploy with aws/provision-stack.sh.

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  MetabaseUrl:
    Type: String
    Description: Metabase base URL

  MetabaseApiKey:
    Type: String
    NoEcho: true
    Description: Metabase API key

  MetabaseCardId:
    Type: String
    Default: "10989"

  FetchBatchSize:
    Type: String
    Default: "500"

  FlagThreshold:
    Type: String
    Default: "0.7"

  InferenceBatchSize:
    Type: String
    Default: "64"

  PgHost:
    Type: String
    Description: PostgreSQL endpoint

  PgPort:
    Type: String
    Default: "5432"

  PgDatabase:
    Type: String
    Default: pod_classifier

  PgUser:
    Type: String
    Default: postgres

  PgPassword:
    Type: String
    NoEcho: true

  VpcId:
    Type: AWS::EC2::VPC::Id

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>

  ScorerImageUri:
    Type: String
    Description: Full ECR image URI tag for the Lambda container

  TmpEphemeralMB:
    Type: Number
    Default: 5120

Resources:

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: POD pipeline Lambda egress
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pod-pipeline-fn-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  PodPipelineFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaExecutionRole
    Properties:
      FunctionName: !Sub pod-pipeline-${Stage}
      PackageType: Image
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ImageUri: !Ref ScorerImageUri
      MemorySize: 3008
      Timeout: 900
      EphemeralStorage:
        Size: !Ref TmpEphemeralMB
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          METABASE_URL: !Ref MetabaseUrl
          METABASE_API_KEY: !Ref MetabaseApiKey
          METABASE_CARD_ID: !Ref MetabaseCardId
          FETCH_BATCH_SIZE: !Ref FetchBatchSize
          FLAG_THRESHOLD: !Ref FlagThreshold
          PG_HOST: !Ref PgHost
          PG_PORT: !Ref PgPort
          PG_DATABASE: !Ref PgDatabase
          PG_USER: !Ref PgUser
          PG_PASSWORD: !Ref PgPassword
          MODEL_PATH: /opt/model/best.pt
          INPUT_SIZE: "224"
          INFERENCE_BATCH_SIZE: !Ref InferenceBatchSize

  SchedulerInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PodPipelineFunction
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pod-pipeline-scheduler-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokePodPipeline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PodPipelineFunction.Arn

  DailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub pod-scoring-daily-${Stage}
      Description: Trigger POD pipeline (single in-memory run, i=0) 23:55 IST (18:25 UTC)
      ScheduleExpression: cron(25 18 * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt PodPipelineFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{"i": 0}'

Outputs:
  PodPipelineFunctionArn:
    Value: !GetAtt PodPipelineFunction.Arn
  PodPipelineFunctionName:
    Value: !Ref PodPipelineFunction
  ScheduleName:
    Value: !Ref DailySchedule
  ScheduleArn:
    Value: !GetAtt DailySchedule.Arn
