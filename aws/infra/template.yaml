AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  POD Quality Scoring Pipeline — single container Lambda using /tmp staging
  for downloaded images (no shared EFS), Metabase ingest, RDS PostgreSQL.
  FETCH_BATCH_SIZE and EphemeralStorage should be tuned together: rough peak
  /tmp MB ≈ FETCH_BATCH_SIZE × avg_image_KB × 1000^{-2} (+ headroom).

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  MetabaseUrl:
    Type: String
    Description: Metabase base URL

  MetabaseApiKey:
    Type: String
    NoEcho: true
    Description: Metabase API key

  MetabaseCardId:
    Type: String
    Default: "10989"
    Description: Metabase card ID to query

  FetchBatchSize:
    Type: String
    Default: "500"
    Description: POD images per staging batch (/tmp spike); lower if nearing ephemeral limit

  FlagThreshold:
    Type: String
    Default: "0.7"
    Description: Score threshold for PASS/FLAG

  PgHost:
    Type: String
    Description: PostgreSQL host endpoint

  PgPort:
    Type: String
    Default: "5432"

  PgDatabase:
    Type: String
    Default: pod_classifier

  PgUser:
    Type: String
    Default: postgres

  PgPassword:
    Type: String
    NoEcho: true

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Lambda and RDS

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets (at least 2 AZs)

  ScorerImageUri:
    Type: String
    Description: ECR image URI for the merged POD pipeline Lambda (container)

  TmpEphemeralMB:
    Type: Number
    Default: 5120
    MinValue: 512
    MaxValue: 10240
    Description: Lambda /tmp quota (MiB); size with FETCH_BATCH_SIZE × avg image bytes

Globals:
  Function:
    Timeout: 900
    Runtime: python3.11

Resources:

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for POD pipeline Lambda (VPC egress)
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  PodPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub pod-pipeline-${Stage}
      PackageType: Image
      ImageUri: !Ref ScorerImageUri
      MemorySize: 3008
      Timeout: 900
      EphemeralStorage:
        Size: !Ref TmpEphemeralMB
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          METABASE_URL: !Ref MetabaseUrl
          METABASE_API_KEY: !Ref MetabaseApiKey
          METABASE_CARD_ID: !Ref MetabaseCardId
          FETCH_BATCH_SIZE: !Ref FetchBatchSize
          FLAG_THRESHOLD: !Ref FlagThreshold
          STAGING_TMP_PATH: /tmp
          PG_HOST: !Ref PgHost
          PG_PORT: !Ref PgPort
          PG_DATABASE: !Ref PgDatabase
          PG_USER: !Ref PgUser
          PG_PASSWORD: !Ref PgPassword
          MODEL_PATH: /opt/model/best.pt
          INPUT_SIZE: "224"
          INFERENCE_BATCH_SIZE: "64"
      Policies:
        - VPCAccessPolicy: {}
    Metadata:
      DockerContext: ../lambda_scorer
      Dockerfile: Dockerfile

  DailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub pod-scoring-daily-${Stage}
      Description: Trigger POD scoring pipeline at 23:55 IST (18:25 UTC)
      ScheduleExpression: cron(25 18 * * ? *)
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt PodPipelineFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: "{}"

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokePodPipeline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PodPipelineFunction.Arn

Outputs:
  PodPipelineFunctionArn:
    Description: ARN of merged Metabase fetch + scorer Lambda
    Value: !GetAtt PodPipelineFunction.Arn

  ScheduleName:
    Value: !Ref DailySchedule

  TmpEphemeralMB:
    Description: Provisioned ephemeral /tmp size for the pipeline Lambda
    Value: !Ref TmpEphemeralMB
