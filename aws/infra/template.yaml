AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: POD Quality Scoring Pipeline — Two-Lambda architecture with shared EFS and RDS PostgreSQL.

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  MetabaseUrl:
    Type: String
    Description: Metabase base URL

  MetabaseApiKey:
    Type: String
    NoEcho: true
    Description: Metabase API key

  MetabaseCardId:
    Type: String
    Default: "10989"
    Description: Metabase card ID to query

  FetchBatchSize:
    Type: String
    Default: "500"
    Description: Number of images per batch

  FlagThreshold:
    Type: String
    Default: "0.7"
    Description: Score threshold for PASS/FLAG

  PgHost:
    Type: String
    Description: PostgreSQL host endpoint

  PgPort:
    Type: String
    Default: "5432"

  PgDatabase:
    Type: String
    Default: pod_classifier

  PgUser:
    Type: String
    Default: postgres

  PgPassword:
    Type: String
    NoEcho: true

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Lambdas, EFS, and RDS

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets (at least 2 AZs)

  ScorerImageUri:
    Type: String
    Description: ECR image URI for the Scorer Lambda container

Globals:
  Function:
    Timeout: 900
    Runtime: python3.11

Resources:

  # --- Security Groups ---
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for POD scoring Lambdas
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  # --- EFS ---
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      LifecyclePolicies:
        - TransitionToIA: AFTER_7_DAYS
      FileSystemTags:
        - Key: Name
          Value: !Sub pod-scoring-efs-${Stage}

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  AccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: /pod-scoring
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "755"

  # --- Lambda Fetcher ---
  FetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub pod-fetcher-${Stage}
      Handler: handler.handler
      CodeUri: ../lambda_fetcher/
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      FileSystemConfigs:
        - Arn: !GetAtt AccessPoint.Arn
          LocalMountPath: /mnt/efs
      Environment:
        Variables:
          METABASE_URL: !Ref MetabaseUrl
          METABASE_API_KEY: !Ref MetabaseApiKey
          METABASE_CARD_ID: !Ref MetabaseCardId
          SCORER_LAMBDA_ARN: !GetAtt ScorerFunction.Arn
          FETCH_BATCH_SIZE: !Ref FetchBatchSize
          FLAG_THRESHOLD: !Ref FlagThreshold
          EFS_MOUNT_PATH: /mnt/efs
      Policies:
        - EFSWriteAccessPolicy:
            FileSystem: !Ref FileSystem
            AccessPoint: !Ref AccessPoint
        - LambdaInvokePolicy:
            FunctionName: !Ref ScorerFunction

  # --- Lambda Scorer ---
  ScorerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub pod-scorer-${Stage}
      PackageType: Image
      ImageUri: !Ref ScorerImageUri
      MemorySize: 3008
      Timeout: 600
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref SubnetIds
      FileSystemConfigs:
        - Arn: !GetAtt AccessPoint.Arn
          LocalMountPath: /mnt/efs
      Environment:
        Variables:
          PG_HOST: !Ref PgHost
          PG_PORT: !Ref PgPort
          PG_DATABASE: !Ref PgDatabase
          PG_USER: !Ref PgUser
          PG_PASSWORD: !Ref PgPassword
          MODEL_PATH: /opt/model/best.pt
          INPUT_SIZE: "224"
          INFERENCE_BATCH_SIZE: "64"
      Policies:
        - EFSWriteAccessPolicy:
            FileSystem: !Ref FileSystem
            AccessPoint: !Ref AccessPoint
        - VPCAccessPolicy: {}
    Metadata:
      DockerContext: ../lambda_scorer
      Dockerfile: Dockerfile

  # --- EventBridge Scheduler ---
  DailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub pod-scoring-daily-${Stage}
      Description: Trigger POD scoring pipeline at 23:55 IST (18:25 UTC)
      ScheduleExpression: cron(25 18 * * ? *)
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt FetcherFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: "{}"

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeFetcher
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt FetcherFunction.Arn

Outputs:
  FetcherFunctionArn:
    Value: !GetAtt FetcherFunction.Arn

  ScorerFunctionArn:
    Value: !GetAtt ScorerFunction.Arn

  FileSystemId:
    Value: !Ref FileSystem

  ScheduleName:
    Value: !Ref DailySchedule
